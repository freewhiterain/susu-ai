# 小苏 AI 助手 —— 一键编排
# 服务：backend（FastAPI+ChromaDB 内嵌）/ frontend（Next.js）/ mock-api / redis
# 启动：docker compose up -d --build
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mock-api:
    build: ./mock-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8001/api/employees'); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内服务发现：覆盖 .env 里的 localhost
      - REDIS_URL=redis://redis:6379/0
      - MOCK_API_BASE_URL=http://mock-api:8001
      - CORS_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      # 持久化 SQLite 与向量库
      - backend-data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      mock-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # 浏览器经 Next.js rewrites 透传到 backend 容器
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  redis-data:
  backend-data:
